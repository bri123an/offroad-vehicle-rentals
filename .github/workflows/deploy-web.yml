name: CD - Deploy Web App to Azure

on:
  push:
    branches: [ main ]
    paths:
      - 'src/OffroadVehicleRentals.Web/**'
      - 'src/OffroadVehicleRentals.Shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'offroad-vehicle-web'
  AZURE_WEBAPP_PACKAGE_PATH: './src/OffroadVehicleRentals.Web'
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Build
      run: dotnet build --configuration Release --no-restore
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Publish
      run: dotnet publish --configuration Release --no-build --output ./publish
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/publish

    - name: Logout from Azure
      run: az logout
      if: always()
